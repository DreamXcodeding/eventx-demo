# Fly.io config สำหรับ EventX API — เปลี่ยน app = "..." เป็นชื่อที่ fly launch สร้างให้
app = "eventx-api"
primary_region = "sin"   # สิงคโปร์ (ใกล้ไทยสุด)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # หยุดเครื่องตอนไม่มี traffic = ฟรี/ประหยัด

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
